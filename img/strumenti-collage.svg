<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Collage illustrato di strumenti musicali: chitarra elettrica, basso, batteria, piano elettrico, tromba e microfoni">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a11"/>
      <stop offset="0.55" stop-color="#0a110b"/>
      <stop offset="1" stop-color="#070b07"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.62" cy="0.52" r="0.6">
      <stop offset="0" stop-color="#caa23e" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#caa23e" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#caa23e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2db8a"/>
      <stop offset="0.5" stop-color="#cfa441"/>
      <stop offset="1" stop-color="#9c7a2b"/>
    </linearGradient>
    <style>
      .fg{fill:none;stroke:#e6c45c;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
      .fgF{fill:#d8af46;stroke:#e6c45c;stroke-width:4;stroke-linejoin:round}
      .mg{fill:none;stroke:#c79a35;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .mgF{fill:#b8922a;stroke:#c79a35;stroke-width:3.5;stroke-linejoin:round}
      .bgL{fill:none;stroke:#7d6528;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .bgF{fill:#5f4d20;stroke:#7d6528;stroke-width:3;stroke-linejoin:round}
      .thin{stroke-width:2.5}
      .dark{stroke:#0a110b;stroke-width:3;fill:none;stroke-linecap:round}
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- ===================== BASSO ELETTRICO (sfondo, sinistra) ===================== -->
  <g transform="translate(225,470) rotate(-14) scale(0.92)" opacity="0.85">
    <!-- corpo -->
    <path class="bgF" d="M -95,-55 C -118,-92 -70,-118 -30,-100 C -12,-90 12,-90 30,-104
      C 72,-126 120,-96 100,-52 C 126,-16 122,72 88,108 C 52,146 -58,146 -92,108
      C -126,70 -122,-18 -95,-55 Z"/>
    <!-- manico lungo -->
    <rect class="bgF" x="-15" y="-470" width="30" height="372" rx="6"/>
    <!-- paletta 4 chiavi -->
    <path class="bgF" d="M -20,-470 L 20,-470 L 26,-548 L -8,-562 L -20,-548 Z"/>
    <g fill="#7d6528"><circle cx="-26" cy="-498" r="7"/><circle cx="-26" cy="-528" r="7"/><circle cx="26" cy="-498" r="7"/><circle cx="26" cy="-528" r="7"/></g>
    <!-- ponte, pickup, manopole -->
    <rect class="bgL" x="-34" y="34" width="68" height="20" rx="4"/>
    <rect class="bgL" x="-40" y="-26" width="80" height="22" rx="4"/>
    <!-- corde -->
    <g stroke="#9c7a2b" stroke-opacity="0.7" stroke-width="1.6">
      <line x1="-9" y1="44" x2="-12" y2="-548"/><line x1="-3" y1="44" x2="-4" y2="-548"/>
      <line x1="3" y1="44" x2="4" y2="-548"/><line x1="9" y1="44" x2="12" y2="-548"/>
    </g>
  </g>

  <!-- ===================== TROMBA (sfondo/medio, alto a destra) ===================== -->
  <g transform="translate(1235,235) rotate(8) scale(1.02)" opacity="0.92">
    <!-- corpo principale (leadpipe verso campana) -->
    <path class="mg" d="M -150,6 L 70,6"/>
    <!-- campana svasata -->
    <path class="mgF" d="M 70,-46 C 150,-44 196,-22 196,6 C 196,34 150,56 70,58 C 96,40 96,-28 70,-46 Z"/>
    <!-- tubo di ritorno superiore -->
    <path class="mg" d="M -150,6 C -188,6 -188,-40 -150,-40 L 60,-40"/>
    <path class="mg" d="M -150,-40 C -176,-40 -176,6 -150,6"/>
    <!-- bocchino -->
    <path class="mgF" d="M -150,-2 l -22,-4 0,16 22,-4 z"/>
    <!-- tre pistoni -->
    <g class="mgF">
      <rect x="-44" y="-78" width="20" height="56" rx="6"/>
      <rect x="-12" y="-78" width="20" height="56" rx="6"/>
      <rect x="20" y="-78" width="20" height="56" rx="6"/>
    </g>
    <g class="mg"><line x1="-34" y1="-78" x2="-34" y2="-6"/><line x1="-2" y1="-78" x2="-2" y2="-6"/><line x1="30" y1="-78" x2="30" y2="-6"/></g>
    <!-- pomelli pistoni -->
    <g fill="#e6c45c"><circle cx="-34" cy="-86" r="7"/><circle cx="-2" cy="-86" r="7"/><circle cx="30" cy="-86" r="7"/></g>
  </g>

  <!-- ===================== BATTERIA (medio, basso a sinistra/centro) ===================== -->
  <g transform="translate(470,650) scale(1.0)" opacity="0.95">
    <!-- piatto crash su asta (sinistra) -->
    <line class="mg" x1="-150" y1="40" x2="-150" y2="240"/>
    <ellipse class="mgF" cx="-150" cy="34" rx="92" ry="20"/>
    <ellipse cx="-150" cy="34" rx="8" ry="3" fill="#0a110b"/>
    <!-- hi-hat (destra) -->
    <line class="mg" x1="168" y1="70" x2="168" y2="250"/>
    <ellipse class="mgF" cx="168" cy="70" rx="62" ry="14"/>
    <ellipse class="mgF" cx="168" cy="58" rx="62" ry="14"/>
    <!-- grancassa (frontale) -->
    <circle class="mgF" cx="0" cy="120" r="120"/>
    <circle class="mg" cx="0" cy="120" r="92"/>
    <g fill="#e6c45c"><circle cx="0" cy="6" r="6"/><circle cx="85" cy="35" r="6"/><circle cx="85" cy="205" r="6"/><circle cx="-85" cy="35" r="6"/><circle cx="-85" cy="205" r="6"/><circle cx="0" cy="234" r="6"/></g>
    <!-- gambe grancassa -->
    <line class="mg" x1="-92" y1="200" x2="-150" y2="252"/>
    <line class="mg" x1="92" y1="200" x2="150" y2="252"/>
    <!-- due tom sopra -->
    <ellipse class="mgF" cx="-58" cy="-8" rx="58" ry="40"/>
    <ellipse class="mg" cx="-58" cy="-12" rx="46" ry="30"/>
    <ellipse class="mgF" cx="62" cy="-12" rx="62" ry="42"/>
    <ellipse class="mg" cx="62" cy="-16" rx="50" ry="32"/>
    <!-- rullante (basso destra) -->
    <ellipse class="mgF" cx="150" cy="186" rx="64" ry="30"/>
    <ellipse class="mg" cx="150" cy="180" rx="64" ry="30"/>
    <line class="mg" x1="120" y1="206" x2="100" y2="262"/>
    <line class="mg" x1="180" y1="206" x2="200" y2="262"/>
  </g>

  <!-- ===================== PIANO ELETTRICO (medio, basso centro) ===================== -->
  <g transform="translate(820,742) scale(1.04)" opacity="0.97">
    <!-- gambe a X -->
    <g class="mg"><line x1="-150" y1="120" x2="-70" y2="40"/><line x1="-70" y1="120" x2="-150" y2="40"/>
      <line x1="150" y1="120" x2="70" y2="40"/><line x1="70" y1="120" x2="150" y2="40"/></g>
    <!-- chassis -->
    <rect class="fgF" x="-270" y="-18" width="540" height="58" rx="8"/>
    <!-- pannello controlli a sinistra -->
    <rect class="mg" x="-256" y="-10" width="58" height="42" rx="5"/>
    <g fill="#e6c45c"><circle cx="-242" cy="2" r="5"/><circle cx="-224" cy="2" r="5"/><circle cx="-206" cy="2" r="5"/></g>
    <!-- tasti bianchi -->
    <g fill="#f4ecd6" stroke="#7d6528" stroke-width="1.4">
      <rect x="-188" y="-12" width="20" height="50" rx="2"/><rect x="-167" y="-12" width="20" height="50" rx="2"/>
      <rect x="-146" y="-12" width="20" height="50" rx="2"/><rect x="-125" y="-12" width="20" height="50" rx="2"/>
      <rect x="-104" y="-12" width="20" height="50" rx="2"/><rect x="-83" y="-12" width="20" height="50" rx="2"/>
      <rect x="-62" y="-12" width="20" height="50" rx="2"/><rect x="-41" y="-12" width="20" height="50" rx="2"/>
      <rect x="-20" y="-12" width="20" height="50" rx="2"/><rect x="1" y="-12" width="20" height="50" rx="2"/>
      <rect x="22" y="-12" width="20" height="50" rx="2"/><rect x="43" y="-12" width="20" height="50" rx="2"/>
      <rect x="64" y="-12" width="20" height="50" rx="2"/><rect x="85" y="-12" width="20" height="50" rx="2"/>
      <rect x="106" y="-12" width="20" height="50" rx="2"/><rect x="127" y="-12" width="20" height="50" rx="2"/>
      <rect x="148" y="-12" width="20" height="50" rx="2"/><rect x="169" y="-12" width="20" height="50" rx="2"/>
      <rect x="190" y="-12" width="20" height="50" rx="2"/><rect x="211" y="-12" width="20" height="50" rx="2"/>
      <rect x="232" y="-12" width="20" height="50" rx="2"/>
    </g>
    <!-- tasti neri (gruppi 2 e 3) -->
    <g fill="#15140c">
      <rect x="-176" y="-12" width="12" height="32" rx="1.5"/><rect x="-155" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="-113" y="-12" width="12" height="32" rx="1.5"/><rect x="-92" y="-12" width="12" height="32" rx="1.5"/><rect x="-71" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="-29" y="-12" width="12" height="32" rx="1.5"/><rect x="-8" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="34" y="-12" width="12" height="32" rx="1.5"/><rect x="55" y="-12" width="12" height="32" rx="1.5"/><rect x="76" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="118" y="-12" width="12" height="32" rx="1.5"/><rect x="139" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="181" y="-12" width="12" height="32" rx="1.5"/><rect x="202" y="-12" width="12" height="32" rx="1.5"/><rect x="223" y="-12" width="12" height="32" rx="1.5"/>
    </g>
  </g>

  <!-- ===================== MICROFONO CON ASTA (medio, destra) ===================== -->
  <g transform="translate(1430,560) rotate(0) scale(1.02)" opacity="0.96">
    <!-- asta verticale + base treppiede -->
    <line class="mg" x1="0" y1="-30" x2="0" y2="250"/>
    <g class="mg"><line x1="0" y1="250" x2="-70" y2="300"/><line x1="0" y1="250" x2="70" y2="300"/><line x1="0" y1="250" x2="0" y2="306"/></g>
    <!-- braccio (asta a giraffa) -->
    <path class="mg" d="M 0,-30 C 0,-78 -54,-86 -96,-110"/>
    <!-- capsula microfono -->
    <g transform="translate(-110,-120) rotate(34)">
      <rect class="fgF" x="-22" y="-44" width="44" height="92" rx="22"/>
      <g stroke="#0a110b" stroke-width="2.5" stroke-linecap="round">
        <line x1="-16" y1="-30" x2="16" y2="-30"/><line x1="-16" y1="-18" x2="16" y2="-18"/>
        <line x1="-16" y1="-6" x2="16" y2="-6"/><line x1="-16" y1="6" x2="16" y2="6"/>
      </g>
      <rect class="mg" x="-12" y="40" width="24" height="22" rx="4"/>
    </g>
  </g>

  <!-- ===================== CHITARRA ELETTRICA (primo piano, centro-destra) ===================== -->
  <g transform="translate(1010,520) rotate(-26) scale(1.16)">
    <!-- corde (sotto al corpo, salgono al manico) -->
    <g stroke="#f0d680" stroke-opacity="0.85" stroke-width="1.5">
      <line x1="-15" y1="52" x2="-13" y2="-470"/><line x1="-9" y1="52" x2="-8" y2="-470"/>
      <line x1="-3" y1="52" x2="-3" y2="-470"/><line x1="3" y1="52" x2="3" y2="-470"/>
      <line x1="9" y1="52" x2="8" y2="-470"/><line x1="15" y1="52" x2="13" y2="-470"/>
    </g>
    <!-- manico -->
    <rect class="fgF" x="-19" y="-410" width="38" height="318" rx="7"/>
    <!-- tastiera tasti -->
    <g class="dark"><line x1="-19" y1="-150" x2="19" y2="-150"/><line x1="-19" y1="-188" x2="19" y2="-188"/>
      <line x1="-19" y1="-226" x2="19" y2="-226"/><line x1="-19" y1="-264" x2="19" y2="-264"/>
      <line x1="-19" y1="-302" x2="19" y2="-302"/><line x1="-19" y1="-340" x2="19" y2="-340"/><line x1="-19" y1="-378" x2="19" y2="-378"/></g>
    <!-- segnatasti -->
    <g fill="#0a110b"><circle cx="0" cy="-207" r="3.5"/><circle cx="0" cy="-283" r="3.5"/><circle cx="0" cy="-359" r="3.5"/></g>
    <!-- paletta 6 in linea -->
    <path class="fgF" d="M -24,-410 L 24,-410 L 30,-466 L 36,-520 L 8,-534 L -8,-520 Z"/>
    <g fill="#e6c45c" stroke="#0a110b" stroke-width="1.5">
      <circle cx="-30" cy="-432" r="6.5"/><circle cx="-32" cy="-460" r="6.5"/><circle cx="-34" cy="-488" r="6.5"/>
      <circle cx="32" cy="-432" r="6.5"/><circle cx="32" cy="-462" r="6.5"/><circle cx="30" cy="-492" r="6.5"/>
    </g>
    <!-- corpo doppio cutaway -->
    <path class="fgF" d="M -100,-70 C -122,-110 -70,-132 -30,-112 C -12,-98 12,-98 30,-112
      C 70,-132 122,-110 100,-70 C 132,-30 130,66 96,112 C 60,152 -60,152 -96,112
      C -130,66 -132,-30 -100,-70 Z"/>
    <!-- battipenna -->
    <path class="mg" d="M -8,-96 C -52,-78 -78,-30 -70,30 C -64,72 -30,96 6,92" opacity="0.85"/>
    <!-- 3 pickup -->
    <g class="mgF"><rect x="-30" y="-58" width="60" height="16" rx="3"/><rect x="-30" y="-18" width="60" height="16" rx="3"/><rect x="-34" y="26" width="68" height="18" rx="3"/></g>
    <!-- ponte + manopole -->
    <rect class="mg" x="-30" y="54" width="60" height="14" rx="3"/>
    <g fill="#e6c45c" stroke="#0a110b" stroke-width="1.5"><circle cx="46" cy="40" r="9"/><circle cx="52" cy="66" r="9"/><circle cx="38" cy="86" r="9"/></g>
    <!-- selettore -->
    <line class="dark" x1="-44" y1="60" x2="-30" y2="74"/>
  </g>

</svg>
