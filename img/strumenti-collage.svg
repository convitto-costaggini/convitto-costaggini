<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Testata elegante del laboratorio musicale: pentagramma dorato con chiave di violino, note e pulviscolo di luce scintillante">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#0f1b12"/><stop offset="0.55" stop-color="#0a120c"/><stop offset="1" stop-color="#060b07"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.62" cy="0.56" r="0.6">
      <stop offset="0" stop-color="#e7c45f" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#cBa23e" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#caa23e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf3cf"/><stop offset="0.3" stop-color="#eccb72"/>
      <stop offset="0.62" stop-color="#c89a36"/><stop offset="1" stop-color="#8a6a22"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbeec5"/><stop offset="0.5" stop-color="#d8b04a"/><stop offset="1" stop-color="#8a6a22"/>
    </linearGradient>
    <radialGradient id="boke" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbeec5" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#e6c45c" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#e6c45c" stop-opacity="0"/>
    </radialGradient>
    <filter id="bk" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
    <filter id="bkBig" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="ng" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="sg" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="2.6"/></filter>

    <g id="spark">
      <path d="M0,-30 C3,-8 8,-3 30,0 C8,3 3,8 0,30 C-3,8 -8,3 -30,0 C-8,-3 -3,-8 0,-30 Z" fill="#fff7da" filter="url(#sg)"/>
      <path d="M0,-15 C2,-4 4,-2 15,0 C4,2 2,4 0,15 C-2,4 -4,2 -15,0 C-4,-2 -2,-4 0,-15 Z" fill="#ffffff"/>
      <path d="M0,-52 L1.5,-2 L0,52 L-1.5,-2 Z" fill="#fff7da" opacity="0.55" filter="url(#sg)"/>
      <path d="M-52,0 L-2,1.5 L52,0 L-2,-1.5 Z" fill="#fff7da" opacity="0.55" filter="url(#sg)"/>
    </g>

    <!-- nota da 1/4 -->
    <g id="q">
      <ellipse cx="0" cy="0" rx="13.5" ry="10" transform="rotate(-22)" fill="url(#gold)"/>
      <rect x="11" y="-66" width="4" height="66" rx="2" fill="url(#goldV)"/>
    </g>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>

  <!-- BOKEH dorato (pulviscolo di luce) -->
  <g>
    <circle cx="1180" cy="300" r="60" fill="url(#boke)" filter="url(#bkBig)" opacity="0.55"/>
    <circle cx="900" cy="250" r="42" fill="url(#boke)" filter="url(#bkBig)" opacity="0.4"/>
    <circle cx="1380" cy="520" r="52" fill="url(#boke)" filter="url(#bkBig)" opacity="0.5"/>
    <circle cx="1040" cy="700" r="46" fill="url(#boke)" filter="url(#bkBig)" opacity="0.42"/>
    <circle cx="660" cy="720" r="38" fill="url(#boke)" filter="url(#bkBig)" opacity="0.32"/>
    <circle cx="1480" cy="240" r="30" fill="url(#boke)" filter="url(#bk)" opacity="0.5"/>
    <circle cx="1280" cy="640" r="24" fill="url(#boke)" filter="url(#bk)" opacity="0.55"/>
    <circle cx="760" cy="430" r="20" fill="url(#boke)" filter="url(#bk)" opacity="0.5"/>
    <circle cx="980" cy="540" r="16" fill="url(#boke)" filter="url(#bk)" opacity="0.6"/>
    <circle cx="1150" cy="470" r="14" fill="url(#boke)" filter="url(#bk)" opacity="0.7"/>
    <circle cx="560" cy="330" r="13" fill="url(#boke)" filter="url(#bk)" opacity="0.45"/>
    <circle cx="1340" cy="380" r="12" fill="url(#boke)" filter="url(#bk)" opacity="0.6"/>
    <circle cx="860" cy="640" r="11" fill="url(#boke)" filter="url(#bk)" opacity="0.55"/>
    <circle cx="1440" cy="700" r="18" fill="url(#boke)" filter="url(#bk)" opacity="0.4"/>
    <circle cx="700" cy="560" r="9" fill="url(#boke)" filter="url(#bk)" opacity="0.6"/>
    <circle cx="1220" cy="180" r="10" fill="url(#boke)" filter="url(#bk)" opacity="0.5"/>
    <circle cx="500" cy="640" r="10" fill="url(#boke)" filter="url(#bk)" opacity="0.4"/>
    <!-- bokeh "ad anello" -->
    <circle cx="1080" cy="360" r="26" fill="none" stroke="#f0d68a" stroke-opacity="0.35" stroke-width="3" filter="url(#bk)"/>
    <circle cx="1320" cy="560" r="20" fill="none" stroke="#f0d68a" stroke-opacity="0.4" stroke-width="2.5" filter="url(#bk)"/>
    <circle cx="820" cy="350" r="16" fill="none" stroke="#f0d68a" stroke-opacity="0.4" stroke-width="2.5" filter="url(#bk)"/>
  </g>

  <!-- PENTAGRAMMA -->
  <g stroke="#dab44f" stroke-opacity="0.34" stroke-width="2.6" fill="none">
    <line x1="0" y1="470" x2="1600" y2="470"/><line x1="0" y1="502" x2="1600" y2="502"/>
    <line x1="0" y1="534" x2="1600" y2="534"/><line x1="0" y1="566" x2="1600" y2="566"/><line x1="0" y1="598" x2="1600" y2="598"/>
  </g>
  <!-- bagliore tenue sotto le note -->
  <ellipse cx="980" cy="500" rx="560" ry="150" fill="url(#spot)" opacity="0.6"/>

  <!-- grande chiave "filigrana" a destra -->
  <g transform="translate(1430,470) scale(2.0)" fill="none" stroke="url(#goldV)" stroke-opacity="0.10" stroke-width="9" stroke-linecap="round">
    <path d="M6,84 C6,108 -30,108 -30,82 C-30,60 -2,56 10,74 C24,96 18,40 8,-2 C-2,-44 2,-92 24,-110 C44,-126 56,-96 50,-70 C44,-44 14,-26 -18,-6 C-44,10 -52,40 -38,60"/>
  </g>

  <!-- CHIAVE DI VIOLINO principale -->
  <g transform="translate(430,548) scale(1.08)" fill="none" stroke="url(#goldV)" stroke-opacity="0.92" stroke-width="10" stroke-linecap="round" filter="url(#ng)">
    <path d="M6,84 C6,108 -30,108 -30,82 C-30,60 -2,56 10,74 C24,96 18,40 8,-2 C-2,-44 2,-92 24,-110 C44,-126 56,-96 50,-70 C44,-44 14,-26 -18,-6 C-44,10 -52,40 -38,60"/>
  </g>

  <!-- MELODIA di note dorate -->
  <g filter="url(#ng)">
    <use href="#q" transform="translate(560,566)"/>
    <use href="#q" transform="translate(640,534)"/>
    <g>
      <use href="#q" transform="translate(740,500)"/>
      <use href="#q" transform="translate(806,500)"/>
      <rect x="753" y="427" width="66" height="9" rx="3" fill="url(#goldV)"/>
    </g>
    <use href="#q" transform="translate(900,470)"/>
    <use href="#q" transform="translate(986,500)"/>
    <g>
      <use href="#q" transform="translate(1086,458)"/>
      <use href="#q" transform="translate(1152,458)"/>
      <rect x="1099" y="385" width="66" height="9" rx="3" fill="url(#goldV)"/>
    </g>
    <use href="#q" transform="translate(1250,520)"/>
    <use href="#q" transform="translate(1342,486)"/>
  </g>

  <!-- SCINTILLII -->
  <use href="#spark" transform="translate(430,470) scale(0.66)"/>
  <use href="#spark" transform="translate(900,470) scale(0.6)"/>
  <use href="#spark" transform="translate(1086,458) scale(0.62)"/>
  <use href="#spark" transform="translate(1342,486) scale(0.5)"/>
  <use href="#spark" transform="translate(1180,300) scale(0.7)"/>
  <use href="#spark" transform="translate(700,560) scale(0.42)"/>
  <use href="#spark" transform="translate(1440,360) scale(0.5)"/>
  <use href="#spark" transform="translate(540,340) scale(0.38)"/>
</svg>
