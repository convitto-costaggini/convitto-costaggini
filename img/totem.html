<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Totem Convitto Costaggini</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
  * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; background:#0f172a; overflow:hidden; }
  #menu-view { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; }
  #menu-view h1 { color:#f8fafc; font-size:1.4rem; margin-bottom:5px; }
  #menu-view p { color:#94a3b8; font-size:0.9rem; margin-top:0; margin-bottom:30px; }
  .menu-btn { width:100%; max-width:340px; padding:22px; margin-bottom:14px; border:none; border-radius:14px; font-size:1.15rem; font-weight:900; color:white; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.4); text-transform:uppercase; letter-spacing:0.5px; }
  #btn-porta { background:#8b5cf6; }
  #btn-mensa { background:#f59e0b; }
  #btn-entrata { background:#10b981; }
  #btn-uscita { background:#ef4444; }

  #totem-view { position:fixed; inset:0; display:none; flex-direction:column; }
  #totem-header { background:#1e293b; color:white; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155; flex-shrink:0; }
  #totem-header h2 { margin:0; font-size:1.1rem; text-transform:uppercase; letter-spacing:1px; }
  #btn-chiudi { background:#b91c1c; color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:900; cursor:pointer; }
  #totem-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:15px; overflow-y:auto; }
  #reader { width:100%; max-width:500px; height:42vh; min-height:220px; border-radius:16px; overflow:hidden; background:black; box-shadow:0 8px 20px rgba(0,0,0,0.5); border:6px solid #334155; }
  #msg { margin-top:15px; width:100%; max-width:500px; background:white; padding:16px; border-radius:12px; font-weight:900; font-size:1.2rem; color:#1e293b; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.15); min-height:60px; display:flex; align-items:center; justify-content:center; }
  #diag { font-size:0.75rem; color:#f59e0b; font-family:monospace; margin-top:10px; text-align:center; word-break:break-all; max-width:500px; }
  #setup-warning { position:fixed; inset:0; background:#0f172a; display:none; align-items:center; justify-content:center; padding:30px; text-align:center; color:#fca5a5; font-size:1rem; z-index:9999; }
</style>
</head>
<body>

<div id="setup-warning">
  ⚠️ Questa pagina non è ancora configurata.<br><br>
  Apri il file totem.html e imposta le costanti APP_URL e TOTEM_TOKEN in cima allo script.
</div>

<div id="menu-view">
  <h1>🏫 Convitto "Costaggini"</h1>
  <p>Seleziona la modalità del totem</p>
  <button class="menu-btn" id="btn-porta" onclick="avvia('PORTA')">🔄 Porta Girevole<br><span style="font-weight:400;font-size:0.8rem;">(entrata/uscita automatica)</span></button>
  <button class="menu-btn" id="btn-mensa" onclick="avvia('MENSA')">🍽️ Mensa</button>
  <button class="menu-btn" id="btn-entrata" onclick="avvia('ENTRATA')">🟢 Solo Entrate</button>
  <button class="menu-btn" id="btn-uscita" onclick="avvia('USCITA')">🔴 Solo Uscite</button>
</div>

<div id="totem-view">
  <div id="totem-header">
    <h2 id="totem-title">TOTEM</h2>
    <button id="btn-chiudi" onclick="chiudiTotem()">✖ CHIUDI</button>
  </div>
  <div id="totem-body">
    <div id="reader"></div>
    <div id="msg">Avvicina il tuo QR Code...</div>
    <div id="diag"></div>
  </div>
</div>

<script>
// =========================================================================
// CONFIGURAZIONE — DA IMPOSTARE PRIMA DI USARE QUESTA PAGINA
// =========================================================================
// URL del Registro Convitto (quello che finisce in /exec), lo stesso che
// usano gli educatori. Esempio:
// var APP_URL = "https://script.google.com/a/macros/alberghierorieti.it/s/XXXXXXX/exec";
var APP_URL = "INSERISCI_QUI_URL_APP_SCRIPT";

// Deve combaciare ESATTAMENTE con la Script Property TOTEM_TOKEN impostata
// nel progetto Apps Script (Impostazioni progetto → Proprietà script).
// Scegli una stringa lunga e casuale, non prevedibile.
var TOTEM_TOKEN = "INSERISCI_QUI_TOKEN_SEGRETO";
// =========================================================================

var scanner = null;
var modalitaCorrente = "";
var inPausa = false;

window.addEventListener('load', function () {
  if (APP_URL.indexOf("INSERISCI_QUI") > -1 || TOTEM_TOKEN.indexOf("INSERISCI_QUI") > -1) {
    document.getElementById('setup-warning').style.display = 'flex';
  }
});

function avvia(modalita) {
  modalitaCorrente = modalita;
  document.getElementById('menu-view').style.display = 'none';
  document.getElementById('totem-view').style.display = 'flex';

  var titoli = { PORTA: "🔄 Porta Girevole", MENSA: "🍽️ Mensa", ENTRATA: "🟢 Entrate", USCITA: "🔴 Uscite" };
  document.getElementById('totem-title').innerText = titoli[modalita] || "TOTEM";
  document.getElementById('msg').innerText = "Avvicina il tuo QR Code...";
  document.getElementById('diag').innerText = "";
  inPausa = false;

  if (!scanner) { scanner = new Html5Qrcode("reader"); }
  scanner.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: { width: 250, height: 250 } },
    function (decodedText) {
      if (inPausa) return;
      inPausa = true;
      onScan(decodedText);
    }
  ).catch(function (err) {
    document.getElementById('msg').innerHTML = "⚠️ Impossibile avviare la fotocamera";
    document.getElementById('diag').innerText = "Motivo tecnico: " + (err && err.message ? err.message : err);
  });
}

function chiudiTotem() {
  if (scanner) {
    try {
      scanner.stop().then(function () { try { scanner.clear(); } catch (e) {} });
    } catch (e) {}
  }
  document.getElementById('totem-view').style.display = 'none';
  document.getElementById('menu-view').style.display = 'flex';
}

function onScan(testoQR) {
  var msgEl = document.getElementById('msg');
  var diagEl = document.getElementById('diag');
  msgEl.innerHTML = "⏳ Verifica in corso...";
  diagEl.innerText = "";

  fetch(APP_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // evita il preflight CORS
    body: JSON.stringify({ action: "totemScan", qr: testoQR, modalita: modalitaCorrente, token: TOTEM_TOKEN })
  })
    .then(function (res) { return res.json(); })
    .then(function (json) {
      if (json.success) {
        var etichette = { USCITA: "Uscita registrata!", RIENTRO: "Rientro registrato!", COLAZIONE: "COLAZIONE OK!", PRANZO: "PRANZO OK!", CENA: "CENA OK!", RIENTRO_PASTO: "OK!" };
        var testoOp = etichette[json.operazione] || (json.operazione + " OK!");
        var nomeBreve = (json.nome || "").split(" ")[0];
        msgEl.innerHTML = "<span style='color:#15803d;font-size:1.4rem;'>✅ Ciao " + nomeBreve + "!</span><br>" + testoOp;
      } else if (json.notFound) {
        msgEl.innerHTML = "<span style='color:#b91c1c;'>❌ QR non riconosciuto</span>";
      } else {
        msgEl.innerHTML = "<span style='color:#b91c1c;'>⚠️ Errore</span>";
        diagEl.innerText = json.message || "";
      }
    })
    .catch(function (err) {
      msgEl.innerHTML = "<span style='color:#b91c1c;'>⚠️ Errore di connessione</span>";
      diagEl.innerText = String(err && err.message ? err.message : err);
    })
    .finally(function () {
      setTimeout(function () {
        msgEl.innerText = "Avvicina il tuo QR Code...";
        diagEl.innerText = "";
        inPausa = false;
      }, 2200);
    });
}
</script>
</body>
</html>
