<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Scegli il tuo percorso | Convitto "Costaggini"</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Source+Sans+3:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background:#0a0f0a; }
    .sim-wrap { max-width:640px; margin:0 auto; padding:2rem 1.25rem 5rem; }
    .sim-card { background:#141e14; border:1px solid rgba(184,146,42,.15); border-radius:14px; padding:2rem; display:none; }
    .sim-card.active { display:block; animation:fadeUp .35s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    .sim-step { font-family:var(--fu); font-size:.58rem; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--oro2); margin-bottom:.5rem; }
    .sim-scenario { font-family:var(--fd); font-size:1.05rem; font-style:italic; color:rgba(245,240,232,.5); line-height:1.6; margin-bottom:.75rem; padding:1rem; background:rgba(255,255,255,.03); border-left:3px solid rgba(184,146,42,.3); border-radius:0 6px 6px 0; }
    .sim-q { font-family:var(--fd); font-size:1.4rem; font-weight:300; color:#fff; line-height:1.4; margin-bottom:1.5rem; }
    .sim-opts { display:flex; flex-direction:column; gap:.65rem; }
    .sim-opt { background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.08); border-radius:10px; padding:1rem 1.25rem; cursor:pointer; text-align:left; transition:all .2s; }
    .sim-opt:hover { border-color:var(--oro2); background:rgba(184,146,42,.08); }
    .sim-opt-title { font-family:var(--fu); font-size:.82rem; font-weight:700; color:#fff; margin-bottom:.25rem; }
    .sim-opt-sub { font-family:var(--fu); font-size:.72rem; color:rgba(245,240,232,.4); line-height:1.5; }
    .sim-progress { display:flex; gap:.4rem; margin-bottom:1.5rem; }
    .sim-dot { flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,.1); transition:background .3s; }
    .sim-dot.done { background:var(--oro2); }
    .sim-dot.active { background:var(--bosco2); }

    /* Risultato */
    .sim-result { display:none; text-align:center; }
    .sim-result.show { display:block; animation:fadeUp .4s ease; }
    .sim-result-card { background:#141e14; border:1px solid rgba(184,146,42,.2); border-radius:14px; padding:2.5rem 1.75rem; }
    .sim-result-icon { font-size:3.5rem; margin-bottom:1rem; display:block; }
    .sim-result-title { font-family:var(--fd); font-size:2rem; font-weight:300; color:#fff; margin-bottom:.4rem; }
    .sim-result-title em { font-style:italic; color:var(--oro3); }
    .sim-result-desc { font-family:var(--fu); font-size:.85rem; color:rgba(245,240,232,.65); line-height:1.8; max-width:460px; margin:0 auto 1.5rem; }
    .sim-result-why { background:rgba(184,146,42,.07); border:1px solid rgba(184,146,42,.15); border-radius:8px; padding:1rem 1.25rem; text-align:left; margin-bottom:1.5rem; }
    .sim-result-why p { font-family:var(--fu); font-size:.78rem; color:rgba(245,240,232,.6); line-height:1.75; margin:0; }
    .sim-result-why strong { color:var(--oro2); }
  </style>
</head>
<body data-page="quiz-percorso">
<main id="main">

  <div style="background:linear-gradient(160deg,#0a0f0a,#1a2e1a);padding:3.5rem 1.25rem 2.5rem;text-align:center">
    <div class="w">
      <nav class="breadcrumb" style="justify-content:center;margin-bottom:1.25rem">
        <a href="scopri-talento.html" style="color:rgba(245,240,232,.35)">← Scopri il tuo Talento</a>
      </nav>
      <p style="font-family:var(--fu);font-size:.6rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--oro2);margin-bottom:.5rem">Simulatore · 5 scelte</p>
      <h1 style="font-family:var(--fd);font-size:clamp(1.8rem,6vw,3.2rem);font-weight:300;color:#fff;margin-bottom:.5rem">Scegli il tuo <em style="font-style:italic;color:var(--oro3)">percorso</em></h1>
      <p style="color:rgba(245,240,232,.5);font-size:.85rem;max-width:480px;margin:0 auto">Cinque piccole scelte di vita ti aiuteranno a capire quale indirizzo fa per te. Non un test — una mappa.</p>
    </div>
  </div>

  <div class="sim-wrap">
    <div id="sim-container"></div>
    <div class="sim-result" id="sim-result">
      <div class="sim-result-card">
        <span class="sim-result-icon" id="sr-icon"></span>
        <h2 class="sim-result-title" id="sr-title"></h2>
        <p class="sim-result-desc" id="sr-desc"></p>
        <div class="sim-result-why"><p id="sr-why"></p></div>
        <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
          <button onclick="restart()" style="font-family:var(--fu);font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:.7rem 1.5rem;background:transparent;border:1.5px solid rgba(184,146,42,.3);color:var(--oro2);border-radius:8px;cursor:pointer">↺ Ricomincia</button>
          <a href="ammissione.html" class="btn-gold">Scopri come iscriverti →</a>
        </div>
      </div>
    </div>
  </div>

</main>
<script src="nav.js"></script>
<script>
const STEPS = [
  {
    scenario: 'È sabato pomeriggio. Non hai niente di programmato.',
    q: 'Come preferiresti trascorrere il tempo?',
    opts: [
      { t:'In cucina a sperimentare', s:'Provo a replicare una ricetta che ho visto online o invento qualcosa con quello che c\'è in frigorifero.', val:{cucina:3} },
      { t:'Fuori con amici', s:'Organizzo qualcosa, scelgo il posto, mi assicuro che tutti stiano bene e si divertano.', val:{accoglienza:3} },
      { t:'Al bar a guardare la gente', s:'Mi piace osservare come si muovono i camerieri, come interagiscono con i clienti.', val:{sala:3} },
      { t:'A fare qualcosa di preciso e creativo', s:'Cuocio, costruisco, dipingo — qualcosa che richieda concentrazione e risultato visibile.', val:{pasticceria:3} },
    ]
  },
  {
    scenario: 'Ti chiedono di organizzare una cena per dieci persone.',
    q: 'Qual è il tuo approccio naturale?',
    opts: [
      { t:'Mi occupo del menu e dei piatti', s:'Scelgo ricette, calcolo le dosi, voglio che il cibo sia perfetto.', val:{cucina:3,pasticceria:1} },
      { t:'Mi occupo di tutto il resto', s:'Tavola, musica, accoglienza degli ospiti — voglio che l\'atmosfera sia giusta.', val:{sala:3,accoglienza:1} },
      { t:'Coordino il gruppo', s:'Assegno compiti, gestisco i tempi, mi assicuro che non manchi niente.', val:{accoglienza:3} },
      { t:'Penso al dessert', s:'Quello che ricordano alla fine è il dolce — ci metto il meglio.', val:{pasticceria:3,cucina:1} },
    ]
  },
  {
    scenario: 'Sei in un ristorante e il servizio è lento.',
    q: 'Cosa pensi guardando i camerieri?',
    opts: [
      { t:'Penso alla cucina', s:'Chissà cosa sta succedendo ai fornelli. Forse il cuoco ha un problema.', val:{cucina:3} },
      { t:'Penso al servizio', s:'Il cameriere dovrebbe comunicare meglio con il tavolo e gestire le attese.', val:{sala:3} },
      { t:'Penso all\'organizzazione', s:'Manca un sistema — forse la prenotazione era troppo piena o i turni mal gestiti.', val:{accoglienza:3} },
      { t:'Non ci penso', s:'Guardo il menu e scelgo già il dessert.', val:{pasticceria:2} },
    ]
  },
  {
    scenario: 'Ti danno una settimana libera in una città straniera.',
    q: 'Cosa fai per prima cosa?',
    opts: [
      { t:'Cerco i mercati e i negozi di alimentari', s:'Voglio vedere cosa usano nelle cucine locali, comprare spezie, assaggiare tutto.', val:{cucina:3,pasticceria:1} },
      { t:'Cerco i ristoranti migliori', s:'Non per il cibo — per capire come lavorano, come trattano gli ospiti.', val:{sala:3} },
      { t:'Cerco un hotel bello', s:'Mi piace osservare come funziona la reception, i servizi, l\'accoglienza.', val:{accoglienza:3} },
      { t:'Cerco le pasticcerie famose', s:'I dolci di una città ti raccontano la sua anima.', val:{pasticceria:3} },
    ]
  },
  {
    scenario: 'Hai appena finito un lavoro ben fatto.',
    q: 'Cos\'è che ti dà più soddisfazione?',
    opts: [
      { t:'Un piatto riuscito perfettamente', s:'Il sapore, la consistenza, la presentazione — tutto esattamente come volevo.', val:{cucina:3} },
      { t:'Un ospite che sorride', s:'Vedere qualcuno contento grazie a quello che ho fatto per lui.', val:{sala:3,accoglienza:2} },
      { t:'Un\'organizzazione senza intoppi', s:'Tutto è andato liscio, niente imprevisti, tutti soddisfatti.', val:{accoglienza:3} },
      { t:'Un dolce che ha stupito tutti', s:'Quella faccia di sorpresa e piacere al primo assaggio — non la cambio con niente.', val:{pasticceria:3} },
    ]
  },
];

const RESULTS = {
  cucina:       { icon:'🍳', title:'Cucina', desc:'Ami creare, sperimentare, lavorare con le mani e i sensi. La cucina è il tuo laboratorio naturale.', why:'Le tue scelte rivelano una persona che pensa ai processi, ama la precisione e vuole vedere il risultato del suo lavoro nel piatto. <strong>L\'indirizzo Enogastronomia</strong> del Costaggini fa per te.' },
  sala:         { icon:'🍷', title:'Sala & Bar', desc:'Ami stare con le persone, creare atmosfere e rendere ogni momento speciale per gli ospiti.', why:'Le tue scelte rivelano una persona che osserva, ascolta e sa creare connessione. <strong>L\'indirizzo Sala e Vendita</strong> del Costaggini fa per te.' },
  accoglienza:  { icon:'🛎️', title:'Accoglienza Turistica', desc:'Ami organizzare, coordinare e mettere le persone a proprio agio in ogni situazione.', why:'Le tue scelte rivelano una persona che pensa al sistema, al comfort degli altri e alla qualità dell\'esperienza complessiva. <strong>L\'indirizzo Accoglienza Turistica</strong> del Costaggini fa per te.' },
  pasticceria:  { icon:'🎂', title:'Pasticceria', desc:'Ami la precisione, la creatività visiva e il momento di stupore che un dolce perfetto sa regalare.', why:'Le tue scelte rivelano una persona creativa e precisa che trova gioia nei dettagli. <strong>Il percorso di Pasticceria</strong> del Costaggini fa per te.' },
};

let scores = { cucina:0, sala:0, accoglienza:0, pasticceria:0 };
let step = 0;

function render() {
  const container = document.getElementById('sim-container');
  if (step >= STEPS.length) { showResult(); return; }
  const s = STEPS[step];
  const dots = STEPS.map((_,i) => `<div class="sim-dot ${i < step ? 'done' : i === step ? 'active' : ''}"></div>`).join('');
  container.innerHTML = `
    <div class="sim-card active">
      <div class="sim-progress">${dots}</div>
      <p class="sim-step">Scelta ${step+1} di ${STEPS.length}</p>
      <p class="sim-scenario">"${s.scenario}"</p>
      <p class="sim-q">${s.q}</p>
      <div class="sim-opts">
        ${s.opts.map((o,i) => `
          <div class="sim-opt" onclick="choose(${i})">
            <div class="sim-opt-title">${o.t}</div>
            <div class="sim-opt-sub">${o.s}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function choose(i) {
  const vals = STEPS[step].opts[i].val;
  Object.entries(vals).forEach(([k,v]) => scores[k] += v);
  step++;
  render();
}

function showResult() {
  document.getElementById('sim-container').innerHTML = '';
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const r = RESULTS[winner];
  document.getElementById('sr-icon').textContent = r.icon;
  document.getElementById('sr-title').innerHTML = `Il tuo percorso è <em>${r.title}</em>`;
  document.getElementById('sr-desc').textContent = r.desc;
  document.getElementById('sr-why').innerHTML = r.why;
  document.getElementById('sim-result').classList.add('show');
}

function restart() {
  scores = { cucina:0, sala:0, accoglienza:0, pasticceria:0 };
  step = 0;
  document.getElementById('sim-result').classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
