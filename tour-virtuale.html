<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Gli ambienti del Convitto Costaggini di Rieti in foto panoramiche: ingresso, corridoi, sala ricreativa, ufficio educatori e altri spazi. Il Convitto visto da dentro."/>
  <meta name="theme-color" content="#2C3E2D"/>
  <title>Tour Virtuale | Convitto "Costaggini" — Rieti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Source+Sans+3:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: #0a0f0a; }

    /* Hero */
    .tv-hero {
      background: linear-gradient(160deg, #0a0f0a, var(--bosco));
      padding: 3.5rem 1.25rem 2.5rem; text-align: center; position: relative; overflow: hidden;
    }
    .tv-hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(184,146,42,.1), transparent);
      pointer-events: none;
    }
    .tv-hero .breadcrumb {
      display: flex; align-items: center; gap: .4rem; justify-content: center;
      font-family: var(--fu); font-size: .72rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(245,240,232,.70);
    }
    .tv-hero .breadcrumb a { color: #D4AA4A; text-decoration: none; }
    .tv-hero .breadcrumb a:hover { color: var(--oro3); }
    .tv-hero .breadcrumb span { color: rgba(245,240,232,.60); }

    /* Galleria ambienti */
    .amb-wrap { max-width: 980px; margin: 0 auto; padding: 2.5rem 1.25rem 1rem; display: flex; flex-direction: column; gap: 2.75rem; }
    .amb { display: block; margin: 0; }
    .amb-img {
      display: block; position: relative; border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(184,146,42,.18); background: #111;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .amb-img img { width: 100%; height: auto; display: block; transition: transform .5s ease; }
    .amb-img:hover img { transform: scale(1.02); }
    .amb-img::after {
      content: '⤢ Ingrandisci'; position: absolute; top: 12px; right: 12px;
      font-family: var(--fu); font-size: .58rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
      color: #fff; background: rgba(10,15,10,.6); border: 1px solid rgba(184,146,42,.4);
      padding: .35rem .65rem; border-radius: 20px; opacity: 0; transition: opacity .25s; pointer-events: none;
    }
    .amb-img:hover::after { opacity: 1; }
    .amb-img:focus-visible { outline: 3px solid var(--oro); outline-offset: 3px; }

    /* Segnaposto "foto in arrivo" */
    .amb-soon {
      display: flex; align-items: center; justify-content: center;
      min-height: 170px; aspect-ratio: 16/5;
      background: repeating-linear-gradient(135deg, #121a12, #121a12 14px, #0f160f 14px, #0f160f 28px);
      border: 1px dashed rgba(184,146,42,.3);
    }
    .amb-soon-in { display: flex; flex-direction: column; align-items: center; gap: .5rem; text-align: center; }
    .amb-soon-icon { font-size: 2.4rem; opacity: .55; }
    .amb-soon-label { font-family: var(--fu); font-size: .62rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: rgba(245,240,232,.45); }

    .amb-cap { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem .25rem 0; }
    .amb-icon { font-size: 1.7rem; flex-shrink: 0; line-height: 1.4; }
    .amb-cap h2 { font-family: var(--fd); font-size: 1.45rem; font-weight: 300; color: #fff; margin: 0 0 .3rem; }
    .amb-cap h2 em { font-style: italic; color: var(--oro3); }
    .amb-cap p { font-family: var(--fu); font-size: .85rem; color: rgba(245,240,232,.6); line-height: 1.75; margin: 0; }
    .amb.is-soon .amb-cap h2, .amb.is-soon .amb-cap p { opacity: .65; }

    /* Chiusura */
    .amb-end { text-align: center; padding: 1.5rem 1.25rem 3.5rem; max-width: 620px; margin: 0 auto; }
    .amb-end p { font-family: var(--fd); font-style: italic; font-size: 1.15rem; color: rgba(245,240,232,.7); line-height: 1.6; margin: 0 0 1.5rem; }
    .amb-end .btns { display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center; }
    .amb-end a.btn-line {
      display: inline-block; font-family: var(--fu); font-size: .7rem; font-weight: 800;
      letter-spacing: .1em; text-transform: uppercase; text-decoration: none;
      padding: .8rem 1.6rem; border-radius: 40px; transition: all .2s;
    }
    .amb-end a.btn-fill { background: linear-gradient(135deg, #B8922A, #D4AA4A); color: #1a2e1b; }
    .amb-end a.btn-fill:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(184,146,42,.35); }
    .amb-end a.btn-ghost { border: 1.5px solid rgba(184,146,42,.45); color: var(--oro2); }
    .amb-end a.btn-ghost:hover { border-color: var(--oro2); color: var(--oro3); }
  </style>
</head>
<body data-page="tour-virtuale">
<main id="main">

  <div class="tv-hero">
    <div class="w" style="position:relative;z-index:1">
      <nav class="breadcrumb" style="margin-bottom:1.25rem">
        <a href="index.html">Home</a><span>›</span>
        <a href="servizi.html">Servizi</a><span>›</span>
        <span aria-current="page">Il Convitto da dentro</span>
      </nav>
      <p style="font-family:var(--fu);font-size:.6rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--oro2);margin-bottom:.5rem">Gli ambienti</p>
      <h1 style="font-family:var(--fd);font-size:clamp(1.8rem,6vw,3.2rem);font-weight:300;color:#fff;margin-bottom:.5rem">Il Convitto <em style="font-style:italic;color:var(--oro3)">da dentro</em></h1>
      <p style="color:rgba(245,240,232,.5);font-size:.85rem;max-width:520px;margin:0 auto">Una passeggiata per gli spazi reali del Convitto, in foto panoramiche. Tocca un'immagine per vederla intera.</p>
    </div>
  </div>

  <div class="amb-wrap" id="amb-wrap"></div>

  <div class="amb-end">
    <p>Le foto raccontano una parte. Il resto si sente solo venendo a trovarci.</p>
    <div class="btns">
      <a class="btn-line btn-fill" href="orientamento.html">Prenota una visita</a>
      <a class="btn-line btn-ghost" href="come-arrivare.html">Come arrivare</a>
    </div>
  </div>

</main>
<script src="nav.js"></script>
<script>
// Ambienti del Convitto. Ognuno cerca la sua foto in img/tour/<id>.jpg:
// se c'è, viene mostrata; se manca, compare il segnaposto "Foto in arrivo".
// Per aggiungere una foto basta caricarla con il nome giusto — appare da sola.
const AMBIENTI = [
  { id:'ingresso',         icon:'🚪',  titolo:'L\'<em>ingresso</em> del Convitto', alt:'L\'ingresso del Convitto Costaggini', desc:'Il primo spazio che ogni convittore attraversa. Accogliente, luminoso, punto di incontro tra il dentro e il fuori.' },
  { id:'corridoi',         icon:'🏛️', titolo:'I <em>corridoi</em>',               alt:'I corridoi del Convitto',            desc:'La spina dorsale del Convitto. I luoghi dove si incrociano migliaia di storie — di mattina di corsa, di sera con calma.' },
  { id:'sala-ricreativa',  icon:'🎮',  titolo:'La <em>sala ricreativa</em>',       alt:'La sala ricreativa',                 desc:'Calciobalilla, ping pong, divani e vetrate sul verde. Lo spazio del gioco, del relax e dello stare insieme dopo lo studio.' },
  { id:'ufficio-educatori',icon:'🖥️', titolo:'L\'<em>ufficio educatori</em>',     alt:'L\'ufficio degli educatori',         desc:'Il cuore operativo del Convitto. Da qui gli educatori coordinano le attività e — nelle giornate limpide — ammirano il Terminillo.' },
  { id:'camera',           icon:'🛏️', titolo:'Una <em>camera tipo</em>',          alt:'Una camera tipo',                    desc:'Spazio personale, sicuro e ordinato. Ogni convittore ha il suo posto — un angolo tutto suo.' },
  { id:'mensa',            icon:'🍽️', titolo:'La <em>mensa</em>',                 alt:'La mensa del Convitto',              desc:'Ogni giorno, un menù cucinato internamente e concordato con la ASL. Un luogo di convivialità vera.' },
  { id:'studio',           icon:'📖',  titolo:'La <em>sala studio</em>',           alt:'La sala studio',                     desc:'Dalle 15:30 alle 17:15, studio guidato con gli educatori. Un ambiente silenzioso e strutturato.' },
  { id:'musica',           icon:'🎵',  titolo:'Il <em>Laboratorio Musicale</em>',  alt:'Il Laboratorio Musicale',            desc:'Fondato da Michele Gaggiano e Dino Barba. Chitarre, tastiere, percussioni — e la libertà di scoprire un talento.' },
  { id:'giardino',         icon:'🌿',  titolo:'Il <em>giardino</em>',             alt:'Il giardino del Convitto',           desc:'Lo spazio aperto del Convitto — con il Terminillo sullo sfondo. Luogo di pausa, di chiacchiere, di aria fresca.' },
];

(function () {
  const wrap = document.getElementById('amb-wrap');
  if (!wrap) return;

  AMBIENTI.forEach(function (a) {
    const fig = document.createElement('figure');
    fig.className = 'amb';
    wrap.appendChild(fig); // appeso subito, così l'ordine resta corretto

    const cap =
      '<figcaption class="amb-cap">' +
        '<span class="amb-icon" aria-hidden="true">' + a.icon + '</span>' +
        '<div><h2>' + a.titolo + '</h2><p>' + a.desc + '</p></div>' +
      '</figcaption>';

    const src = 'img/tour/' + a.id + '.jpg';
    const probe = new Image();
    probe.onload = function () {
      fig.innerHTML =
        '<a class="amb-img" href="' + src + '" target="_blank" rel="noopener" aria-label="Apri la foto: ' + a.alt + '">' +
          '<img src="' + src + '" alt="' + a.alt + '" loading="lazy"/>' +
        '</a>' + cap;
    };
    probe.onerror = function () {
      fig.classList.add('is-soon');
      fig.innerHTML =
        '<div class="amb-img amb-soon">' +
          '<div class="amb-soon-in"><span class="amb-soon-icon" aria-hidden="true">' + a.icon + '</span>' +
          '<span class="amb-soon-label">Foto in arrivo</span></div>' +
        '</div>' + cap;
    };
    probe.src = src;
  });
})();
</script>
</body>
</html>
